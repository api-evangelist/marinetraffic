specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: MarineTraffic
providerId: marinetraffic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - AIS
  - Maritime
  - Shipping
  - Vessel Tracking
  - Rate Limiting
description: MarineTraffic's public service documentation portal (servicedocs.marinetraffic.com) describes
  authentication via API key but does not publish per-second, per-minute, or per-month request limits;
  consumption is governed by the credit pack purchased and any per-endpoint frequency restrictions agreed
  in contract. With MarineTraffic now operated by Kpler, rate-limit policies are effectively contract-
  scoped and not externally visible. This artifact records that absence rather than fabricating numbers.
notes: |
  No public rate-limit numbers are documented. Historical guidance discouraged polling endpoints faster
  than each endpoint's update frequency (e.g. PS01 vessel positions every few minutes per vessel) but
  no hard RPS / RPM ceiling is published. Set reconciled to true once a numeric limit is confirmed.
sources:
  - https://servicedocs.marinetraffic.com/
  - https://www.kpler.com/product/maritime/data-services
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-account credit consumption
    scope: account
    metric: varies
    limit: 'see contract / credit pack'
    notes: Consumption is metered against a prepaid credit balance; per-endpoint frequency caps are set
      contractually rather than as a published RPS.
  - name: Per-endpoint polling cadence
    scope: account/endpoint
    metric: varies
    limit: 'see endpoint update frequency'
    notes: Each endpoint (PS01, VI01, EV01, etc.) has a natural refresh cadence; polling faster than that
      cadence wastes credits and may be throttled at the gateway.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 / 503 responses and honor
      Retry-After when present.
  - name: Credit-Based Throttling
    description: The primary throttle is credit balance, not RPS. Exhausting credits returns an account-
      level error rather than a transient 429.
  - name: Contract-Scoped Limits
    description: Hard limits are negotiated as part of the commercial agreement; verify ceilings with the
      account team before scaling consumption.
maintainers:
