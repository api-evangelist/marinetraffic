specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: MarineTraffic
providerId: marinetraffic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - AIS
  - Maritime
  - Shipping
  - Vessel Tracking
description: MarineTraffic is now operated by Kpler and the public AIS API services pages redirect to
  Kpler's Maritime Data Services product page, which does not publish per-tier pricing or per-call rates.
  Commercial access (API credits, vessel/area-based subscriptions, and enterprise data feeds) is sold
  via direct sales engagement. The legacy MarineTraffic API offered credit-based packs for endpoints
  such as PS01 (Vessel Positions), VI01 (Vessel Information), and EV01 (Port Calls), but current pricing
  must be obtained from Kpler. This artifact remains a scaffold until per-call or per-credit pricing is
  recovered from the vendor.
notes: |
  No public pricing page is available. MarineTraffic was acquired by Kpler; the historical
  www.marinetraffic.com/en/ais-api-services URL now 301-redirects to www.kpler.com/product/maritime/data-services
  which lists product capabilities only and routes pricing requests through "Contact Sales".
  Set reconciled to true once a quoted credit pack or per-call rate is obtained.
sources:
  - https://www.marinetraffic.com/en/p/api-services
  - https://www.kpler.com/product/maritime/data-services
  - https://servicedocs.marinetraffic.com/
plans:
  - id: marinetraffic-contact-sales
    name: Contact Sales
    type: enterprise
    description: All commercial access to the MarineTraffic API surface (now operated by Kpler) is negotiated
      through direct sales. Prepaid credit packs and subscription tiers existed historically but current
      pricing is not published.
    entries:
      - label: API Access
        description: Request volume, included endpoints, and credit pricing are quoted per engagement.
        name: api_access
        type: tiered
        metric: varies
        limit: 'see vendor'
        timeFrame: usage
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
    elements:
      - name: AIS Vessel Tracking
      - name: Real-time Events (Port Calls, Bunkering)
      - name: Predictive Events (ETA / Voyage Forecasting)
      - name: Past Events / Historical Movements
      - name: Ship Database
      - name: Dedicated Account Management (Enterprise)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
