specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: MarineTraffic
providerId: marinetraffic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - AIS
  - Maritime
  - Shipping
  - Vessel Tracking
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for MarineTraffic (Kpler): credit-pack and contract-priced
  maritime data API where consumption is allocated through API-key attribution and credit drawdown rather
  than metered transaction billing.'
notes: |
  Public pricing is not available; meters and FOCUS columns reflect the credit-based model historically
  used by MarineTraffic and continued under Kpler. Replace 'varies' meter pricing once a quote is obtained.
sources:
  - https://www.kpler.com/product/maritime/data-services
  - https://servicedocs.marinetraffic.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Kpler Holding SA (MarineTraffic)
serviceCategory: Maritime Data API
billingModel:
  pricingCategory: Prepaid Credit Pack + Contract
  billingFrequency: Annual / Per-Invoice
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: MarineTraffic API
  ServiceCategory: Maritime Data API
  ProviderName: MarineTraffic
  PublisherName: Kpler Holding SA
  InvoiceIssuerName: Kpler Holding SA
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Committed
meters:
  - name: api_credits
    description: Prepaid credits drawn down per call; per-endpoint credit cost varies (PS01, VI01, EV01,
      etc.).
    unit: credit
    aggregation: sum
    dimensions:
      - endpoint
      - api_key
      - vessel_or_area
  - name: vessel_subscriptions
    description: Per-vessel or per-fleet subscription used for tracked vessels and historical access.
    unit: vessel-month
    aggregation: max
    dimensions:
      - imo
      - mmsi
      - account
  - name: data_feed
    description: Negotiated bulk / streaming data feed (AIS satellite + terrestrial), priced per contract.
    unit: month
    aggregation: max
    dimensions:
      - feed_type
      - region
principles:
  - name: Visibility
    description: Consumption is visible through the customer's MarineTraffic / Kpler account dashboard
      (credit balance, per-endpoint usage). There is no public usage API at this time; export usage CSVs
      from the account portal.
  - name: Allocation
    description: Allocate by API key per consuming team or product; tag downstream queries with vessel,
      voyage, or area-of-interest identifiers to support per-asset cost attribution.
  - name: Optimization
    description: Match endpoint polling cadence to the underlying refresh frequency, prefer event endpoints
      (port calls, bunkering) over polling positions, and cache vessel-static data (Ship Database) to
      avoid redundant credit consumption.
  - name: Accountability
    description: Designate a credit-pack owner who monitors burn rate against the prepaid balance and
      negotiates renewal volume / discounts before contract anniversary.
maintainers:
