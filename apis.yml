        type: Documentation
    description: >-
      MarineTraffic Real-time Events API delivers live updates on port calls, bunkering
      operations, ship-to-ship transfers, and other maritime events as they occur.
  - aid: marinetraffic:marinetraffic-predictive-events-api
    name: MarineTraffic Predictive Events API
    tags:
      - ETA
      - Maritime
      - Predictions
      - Voyage Forecasting
