        type: Documentation
    description: >-
      MarineTraffic Predictive Events API delivers predicted destinations, estimated
      time of arrivals (ETAs), and voyage forecasts using AI and AIS data analysis.
  - aid: marinetraffic:marinetraffic-past-events-api
    name: MarineTraffic Past Events API
    tags:
      - Historical
