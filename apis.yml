    properties:
      - url: https://www.marinetraffic.com/en/ais-api-services
        type: Documentation
    description: >-
      MarineTraffic provides AIS (Automatic Identification System) vessel tracking
      APIs delivering real-time vessel positions, speeds, headings, destinations,
      and ETAs. The REST API returns XML-formatted AIS data for fleet monitoring,
      port operations, and supply chain visibility.
