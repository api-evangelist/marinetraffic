        type: Documentation
    description: >-
      MarineTraffic Past Events API provides access to historical vessel movements
      and events, enabling retrospective analysis of shipping patterns, port call
      history, and voyage records.
  - aid: marinetraffic:marinetraffic-ship-database-api
    name: MarineTraffic Ship Database API
    tags:
      - Maritime
      - Ship Registry
      - Vessel Data
    image: https://raw.githubusercontent.com/api-evangelist/marinetraffic/refs/heads/main/image.png
    humanURL: https://www.kpler.com/product/maritime/data-services
    baseURL: https://services.marinetraffic.com/api
    properties:
      - url: https://www.kpler.com/product/maritime/data-services
        type: Documentation
    description: >-
      MarineTraffic Ship Database API provides detailed information on vessel characteristics,
      ownership, photos, vessel type, flag state, dimensions, and technical specifications
      for ships worldwide.
  - aid: marinetraffic:marinetraffic-api
    name: MarineTraffic AIS Vessel Tracking API
    tags:
      - AIS
      - Maritime
      - Shipping
      - Vessel Tracking
      - XML
    image: https://raw.githubusercontent.com/api-evangelist/marinetraffic/refs/heads/main/image.png
    humanURL: https://www.marinetraffic.com/en/ais-api-services
